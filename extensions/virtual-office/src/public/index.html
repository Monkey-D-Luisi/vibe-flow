<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Office - OpenClaw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #office-canvas {
      display: block;
      width: calc(100vw - 320px);
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    /* Dashboard sidebar */
    #dashboard-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 320px;
      height: 100vh;
      background: rgba(26, 26, 46, 0.95);
      border-left: 1px solid #3d3d5c;
      overflow-y: auto;
      z-index: 10;
      font-size: 12px;
      padding: 8px;
    }
    .dash-section { margin-bottom: 12px; }
    .dash-header {
      font-size: 13px;
      font-weight: bold;
      color: #6366f1;
      border-bottom: 1px solid #3d3d5c;
      padding-bottom: 4px;
      margin-bottom: 6px;
    }
    .dash-header-split {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .dash-connection {
      font-size: 10px;
      border: none;
    }
    .dash-agent-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 6px 6px;
      font-size: 12px;
      border-left: 3px solid transparent;
      border-radius: 4px;
      transition: background 0.3s, border-color 0.3s, opacity 0.3s;
    }
    .dash-agent-row:nth-child(even) {
      background: rgba(255, 255, 255, 0.02);
    }
    .dash-agent-active {
      border-left-color: #10b981;
      background: rgba(16, 185, 129, 0.05);
    }
    .dash-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dash-agent-top {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .dash-name {
      min-width: 62px;
      flex-shrink: 0;
      color: #e0e0e0;
    }
    .dash-agent-meta {
      display: flex;
      gap: 6px;
      min-width: 0;
      font-size: 11px;
    }
    .dash-meta-label {
      width: 52px;
      flex-shrink: 0;
      color: #7c83b6;
      text-transform: uppercase;
      font-size: 10px;
    }
    .dash-meta-value {
      flex: 1;
      color: #a0a0c0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dash-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: bold;
      color: #fff;
      white-space: nowrap;
    }
    .dash-badge-busy,
    .dash-badge-live { background: #10b981; }
    .dash-badge-idle { background: #6b7280; }
    .dash-badge-offline { background: #ef4444; }
    .dash-badge-recent { background: #f59e0b; }
    .dash-badge-stale { background: #7c3aed; }
    .dash-badge-connecting { background: #3b82f6; }
    .dash-agent-row[data-freshness="stale"] {
      opacity: 0.85;
    }
    .dash-agent-row[data-freshness="offline"] {
      opacity: 0.75;
    }
    .dash-pipeline {
      color: #888;
      font-size: 11px;
    }
    .dash-pipeline-empty {
      color: #555;
      font-style: italic;
    }
    .dash-pipe-task { color: #e0e0e0; font-weight: bold; }
    .dash-pipe-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .dash-pipe-stage-line {
      color: #c7d2fe;
      margin-bottom: 4px;
    }
    .dash-pipe-meta {
      color: #a0a0c0;
      margin-top: 3px;
    }
    .dash-pipe-agents { color: #888; font-size: 10px; }
    .pipe-bar {
      display: flex;
      gap: 2px;
      margin: 6px 0;
    }
    .pipe-seg {
      flex: 1;
      text-align: center;
      font-size: 8px;
      padding: 3px 0;
      border: 1px solid #3d3d5c;
      border-radius: 2px;
      color: #555;
    }
    .pipe-seg.done {
      background: #3d3d5c;
      color: #a0a0c0;
    }
    .pipe-seg.current {
      background: #6366f1;
      color: #fff;
      font-weight: bold;
    }
    .dash-feed-section { flex: 1; }
    .dash-feed {
      max-height: 300px;
      overflow-y: auto;
    }
    .feed-entry {
      padding: 2px 0;
      font-size: 12px;
      color: #a0a0c0;
      border-bottom: 1px solid rgba(61, 61, 92, 0.3);
    }
    .feed-time { color: #666; }
    .feed-agent { color: #6366f1; font-weight: bold; }
    .feed-task { color: #93c5fd; margin-left: 4px; }
    .feed-empty { color: #555; font-style: italic; }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    #loading h1 {
      font-size: 24px;
      color: #6366f1;
      margin-bottom: 16px;
    }
    #loading p {
      font-size: 14px;
      color: #888;
    }
    .blink {
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>Virtual Office</h1>
    <p>Initializing<span class="blink">_</span></p>
  </div>
  <canvas id="office-canvas"></canvas>
  <script type="module" src="/office/office.js"></script>
</body>
</html>
