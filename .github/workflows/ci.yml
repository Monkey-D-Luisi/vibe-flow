name: CI
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install
      - run: pnpm --filter @agents/task-mcp test -- --coverage
      - run: pnpm --filter @agents/task-mcp run lint
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: services/task-mcp/coverage/

  quality-gate:
    needs: test-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install
      - name: Create coverage directory
        run: mkdir -p services/task-mcp/coverage
      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: services/task-mcp/coverage/
      - name: List coverage files
        run: ls -la services/task-mcp/coverage/
      - name: Check test coverage
        run: node scripts/check-quality.mjs
