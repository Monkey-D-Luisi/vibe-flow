name: CI
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  push:
    branches:
      - main
      - feature/**
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @agents/task-mcp test --coverage
      - run: pnpm dlx tsx tooling/quality-mcp/cli/qcli.ts run --coverage
      - run: pnpm --filter @agents/task-mcp run lint
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: services/task-mcp/coverage/
      - name: Upload quality coverage report
        uses: actions/upload-artifact@v4
        with:
          name: qreport-coverage
          path: ./.qreport/coverage.json

  quality-gate:
    needs: test-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --no-frozen-lockfile
      - name: Create coverage directory
        run: mkdir -p services/task-mcp/coverage
      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: services/task-mcp/coverage/
      - name: List coverage files
        run: ls -la services/task-mcp/coverage/
      - name: Check test coverage
        id: coverage_check
        run: node scripts/check-quality.mjs --output services/task-mcp/coverage/quality-summary.json
      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-quality-summary
          path: services/task-mcp/coverage/quality-summary.json
