name: CI
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  push:
    branches:
      - main
      - feature/**
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @agents/task-mcp test -- --coverage
      - run: pnpm dlx tsx tooling/quality-mcp/cli/qcli.ts run --coverage
      - run: pnpm q:tests
      - run: pnpm dlx tsx tooling/quality-mcp/cli/qcli.ts run --lint --cmd "pnpm -C services/task-mcp lint -f json"
      - run: pnpm dlx tsx tooling/quality-mcp/cli/qcli.ts run --complexity
      - name: Upload quality tests report
        uses: actions/upload-artifact@v4
        with:
          name: qreport-tests
          path: ./.qreport/tests.json
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: services/task-mcp/coverage/
      - name: Upload quality coverage report
        uses: actions/upload-artifact@v4
        with:
          name: qreport-coverage
          path: ./.qreport/coverage.json
      - name: Upload quality lint report
        uses: actions/upload-artifact@v4
        with:
          name: qreport-lint
          path: ./.qreport/lint.json
      - name: Upload quality complexity report
        uses: actions/upload-artifact@v4
        with:
          name: qreport-complexity
          path: ./.qreport/complexity.json

