name: pr-bot

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]
  workflow_run:
    workflows: [quality-gate]
    types: [completed]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      issues: write
      projects: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile --filter @agents/task-mcp --filter @agents/quality-mcp-server
        shell: bash
      - name: Run PR Bot sync
        run: node services/task-mcp/scripts/pr-bot-sync.mjs "$GITHUB_EVENT_PATH"
        env:
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          GH_APP_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
          PR_TOKEN: ${{ secrets.PR_TOKEN }}
          QUALITY_MCP_KEYS: ${{ secrets.QUALITY_MCP_KEYS }}

