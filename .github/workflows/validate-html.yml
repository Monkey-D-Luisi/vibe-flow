name: Validate HTML

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/validate-html.yml'
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/validate-html.yml'

permissions:
  contents: read

jobs:
  html-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install html-validate
        run: npm install --global html-validate@8

      - name: Validate site/index.html
        run: html-validate site/index.html
