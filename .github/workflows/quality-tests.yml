name: quality-tests
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  push:
    branches:
      - main
      - feature/**
  workflow_dispatch:
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - run: pnpm i --no-frozen-lockfile
      - run: pnpm --filter @agents/task-mcp test -- --coverage
      - run: pnpm q:tests
      - run: pnpm dlx tsx tooling/quality-mcp/cli/qcli.ts run --coverage
      - name: Save test report
        uses: actions/upload-artifact@v4
        with:
          name: qreport-tests
          path: ./.qreport/tests.json
      - name: Save coverage report
        uses: actions/upload-artifact@v4
        with:
          name: qreport-coverage
          path: ./.qreport/coverage.json
