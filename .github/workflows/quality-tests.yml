name: quality-tests
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm i
      - run: pnpm q:tests
      - name: Save test report
        uses: actions/upload-artifact@v4
        with:
          name: qreport-tests
          path: ./.qreport/tests.json