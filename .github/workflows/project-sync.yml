name: Project Sync
on:
  pull_request:
    types: [opened, ready_for_review, review_requested, review_request_removed, closed, converted_to_draft]
  issues:
    types: [opened, edited, closed]
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Config
            const owner = context.repo.owner
            const projectNumber = 3 // your Project v2 number

            // Simple status mapping
            function mapStatus(evt, payload){
              if (context.eventName === "issues") {
                return payload.issue.state === "closed" ? "Done" : "To Do"
              }
              const pr = payload.pull_request
              if (pr.merged) return "Done"
              if (pr.draft) return "In Review" // draft PR = tech review
              return pr.state === "open" ? "In Review" : "Done"
            }
            const statusValue = mapStatus(context.payload.action, context.payload)

            // Helper: get project for org or user owner
            async function getProject(login, number){
              const fieldSelection = `
                fields(first:50){
                  nodes {
                    __typename
                    ... on ProjectV2Field {
                      id
                      name
                      dataType
                    }
                    ... on ProjectV2SingleSelectField {
                      id
                      name
                      dataType
                      options { id name }
                    }
                  }
                }
              `
              const qOrg = `query($login:String!,$number:Int!){
                organization(login:$login){
                  projectV2(number:$number){
                    id
                    ${fieldSelection}
                  }
                }
              }`
              try {
                const resOrg = await github.graphql(qOrg, { login, number })
                if (resOrg?.organization?.projectV2) return resOrg.organization.projectV2
              } catch (e) {}
              const qUser = `query($login:String!,$number:Int!){
                user(login:$login){
                  projectV2(number:$number){
                    id
                    ${fieldSelection}
                  }
                }
              }`
              const resUser = await github.graphql(qUser, { login, number })
              return resUser?.user?.projectV2
            }

            // 1) Get Project and fields
            const project = await getProject(owner, projectNumber)
            if (!project) { core.notice(`Project #${projectNumber} not found for '${owner}', skipping sync`); return }
            const statusField = project.fields.nodes.find(f => f.__typename === "ProjectV2SingleSelectField" && f.name === "Status")
            if (!statusField) { core.notice("Project field 'Status' not found, skipping sync"); return }
            if (!statusField.options?.length) { core.notice("Project field 'Status' has no options, skipping sync"); return }

            // 2) Ensure item exists in project
            const nodeId = context.eventName === "issues"
              ? context.payload.issue.node_id
              : context.payload.pull_request.node_id

            const addRes = await github.graphql(`
              mutation($projectId:ID!,$itemId:ID!){
                addProjectV2ItemById(input:{projectId:$projectId, contentId:$itemId}){ item { id } }
              }`,
              { projectId: project.id, itemId: nodeId }
            )
            const itemId = addRes.addProjectV2ItemById.item.id

            // 3) Update Status
            // Find matching option id for the desired status value
            const option = statusField.options?.find(o => o.name === statusValue)
            if (!option) { core.notice(`Status option '${statusValue}' not found, skipping sync`); return }

            await github.graphql(`
              mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!){
                updateProjectV2ItemFieldValue(input:{
                  projectId:$projectId, itemId:$itemId,
                  fieldId:$fieldId, value:{singleSelectOptionId:$optionId}
                }) { clientMutationId }
              }`,
              { projectId: project.id, itemId, fieldId: statusField.id, optionId: option.id }
            )

            // 4) Handle epic-task relationships
            const labels = context.eventName === "issues" ? context.payload.issue.labels ?? [] : context.payload.pull_request.labels ?? []
            const isTask = labels.some(l => l.name === "task")
            if (isTask) {
              const epicLabel = labels.find(l => l.name.startsWith("epic_"))
              if (epicLabel) {
                await handleEpicUpdate(epicLabel.name, statusValue, project, statusField, github, context)
              }
            }

            // Helper functions
            async function handleEpicUpdate(epicLabel, taskStatus, project, statusField, github, context) {
              // Find epic issue
              const epicQuery = `query($owner:String!, $repo:String!, $label:String!) {
                repository(owner:$owner, name:$repo) {
                  issues(labels:[$label], first:10) {
                    nodes {
                      number
                      title
                      node_id
                      labels(first:10) { nodes { name } }
                    }
                  }
                }
              }`
              const epicRes = await github.graphql(epicQuery, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                label: epicLabel
              })
              const epics = epicRes.repository.issues.nodes.filter(issue => 
                !issue.labels.nodes.some(l => l.name === "task")
              )
              if (epics.length === 0) return
              const epic = epics[0] // Assume first is the epic
              const epicNodeId = epic.node_id

              // Get current epic status in project
              const epicStatus = await getItemStatus(epicNodeId, project.id, statusField.id, github)
              if (!epicStatus) return // Epic not in project

              if (taskStatus === "In Progress" && epicStatus === "To Do") {
                await updateItemStatus(epicNodeId, "In Progress", project.id, statusField, github)
              } else if (taskStatus === "Done") {
                const allTasksDone = await checkAllTasksDone(epicLabel, project.id, statusField.id, github, context)
                if (allTasksDone) {
                  await updateItemStatus(epicNodeId, "Done", project.id, statusField, github)
                }
              }
            }

            async function getItemStatus(itemNodeId, projectId, fieldId, github) {
              const query = `query($projectId:ID!, $itemId:ID!, $fieldId:ID!) {
                node(id:$itemId) {
                  ... on ProjectV2Item {
                    fieldValueByName(name:"Status") {
                      ... on ProjectV2ItemFieldSingleSelectValue {
                        name
                      }
                    }
                  }
                }
              }`
              try {
                const res = await github.graphql(query, { projectId, itemId: itemNodeId, fieldId })
                return res.node?.fieldValueByName?.name
              } catch (e) {
                return null
              }
            }

            async function updateItemStatus(itemNodeId, newStatus, projectId, statusField, github) {
              const option = statusField.options.find(o => o.name === newStatus)
              if (!option) return
              await github.graphql(`
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!){
                  updateProjectV2ItemFieldValue(input:{
                    projectId:$projectId, itemId:$itemId,
                    fieldId:$fieldId, value:{singleSelectOptionId:$optionId}
                  }) { clientMutationId }
                }`,
                { projectId, itemId: itemNodeId, fieldId: statusField.id, optionId: option.id }
              )
            }

            async function checkAllTasksDone(epicLabel, projectId, fieldId, github, context) {
              // Get all tasks for epic
              const tasksQuery = `query($owner:String!, $repo:String!, $epicLabel:String!, $taskLabel:String!) {
                repository(owner:$owner, name:$repo) {
                  issues(labels:[$epicLabel, $taskLabel], first:50) {
                    nodes {
                      node_id
                    }
                  }
                }
              }`
              const tasksRes = await github.graphql(tasksQuery, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                epicLabel,
                taskLabel: "task"
              })
              const taskNodeIds = tasksRes.repository.issues.nodes.map(n => n.node_id)

              // Check status of each task
              for (const taskId of taskNodeIds) {
                const status = await getItemStatus(taskId, projectId, fieldId, github)
                if (status !== "Done") return false
              }
              return true
            }
