name: Project Sync
on:
  pull_request:
    types: [opened, ready_for_review, review_requested, review_request_removed, closed, converted_to_draft]
  issues:
    types: [opened, edited, closed]
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Configura
            const owner = context.repo.owner
            const repo  = context.repo.repo
            const projectNumber = 1 // tu Project v2
            // Mapeo simple
            function mapStatus(evt, payload){
              if (context.eventName === "issues") {
                return payload.issue.state === "closed" ? "Done" : "To Do"
              }
              const pr = payload.pull_request
              if (pr.merged) return "Done"
              if (pr.draft) return "In Review"   // draft PR = en revisión técnica
              return pr.state === "open" ? "In Review" : "Done"
            }

            const statusValue = mapStatus(context.payload.action, context.payload)
            // 1) Obtener el Project y campos
            const {organization} = await github.graphql(`
              query($login:String!,$number:Int!){
                organization(login:$login){
                  projectV2(number:$number){
                    id
                    fields(first:50){ nodes { ... on ProjectV2Field { id name dataType } }
                    }
                  }
                }
              }`,
              { login: owner, number: projectNumber }
            )
            const project = organization.projectV2
            const statusField = project.fields.nodes.find(f => f.name === "Status")
            if (!statusField) { core.setFailed("Campo 'Status' no existe en el Project"); return }

            // 2) Asegurar item en project
            const nodeId = context.eventName === "issues" 
              ? context.payload.issue.node_id 
              : context.payload.pull_request.node_id            const addRes = await github.graphql(`
              mutation($projectId:ID!,$itemId:ID!){
                addProjectV2ItemById(input:{projectId:$projectId, contentId:$itemId}){ item { id } }
              }`,
              { projectId: project.id, itemId: nodeId }
            )
            const itemId = addRes.addProjectV2ItemById.item.id

            // 3) Actualizar Status
            await github.graphql(`
              mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $value:String!){
                updateProjectV2ItemFieldValue(input:{
                  projectId:$projectId, itemId:$itemId,
                  fieldId:$fieldId, value:{singleSelectOptionName:$value}
                }) { clientMutationId }
              }`,
              { projectId: project.id, itemId, fieldId: statusField.id, value: statusValue }
            )