name: Project Sync

on:
  pull_request:
    types: [opened, reopened, edited, synchronize, ready_for_review, review_requested, review_request_removed, closed, converted_to_draft]
  issues:
    types: [opened, edited, closed, reopened, assigned, unassigned, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write
  issues: write
  repository-projects: write

jobs:
  sync:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const projectNumber = 3
            const action = context.payload.action

            function normalizeLabelNames(labels) {
              if (!Array.isArray(labels)) return []
              return labels
                .map(label => (typeof label === "string" ? label : label?.name))
                .filter(Boolean)
            }

            function mapIssueStatus(payload) {
              if (payload.issue.state === "closed" || action === "closed") return "Done"
              if (action === "assigned") return "In Progress"
              if (action === "unassigned") {
                return (payload.issue.assignees?.length ?? 0) > 0 ? "In Progress" : "To Do"
              }
              if (action === "opened" || action === "reopened") return "To Do"
              return null
            }

            function mapPullRequestStatus(payload) {
              const pr = payload.pull_request
              if (!pr) return null
              if (pr.merged) return "Done"
              if (pr.state === "closed" || action === "closed") return "In Progress"
              if (action === "converted_to_draft" || pr.draft) return "In Progress"
              if (pr.state === "open") {
                return "In Review"
              }
              return null
            }

            function getEpicCode(labels) {
              const epicLabel = labels.find(label => /^epic:/i.test(label))
              if (!epicLabel) return null
              const code = epicLabel.split(":")[1]
              return code?.trim().toUpperCase() || null
            }

            async function setArchiveState(projectId, itemId, archived) {
              const mutationName = archived ? "archiveProjectV2Item" : "unarchiveProjectV2Item"
              await github.graphql(
                `
                mutation($projectId:ID!, $itemId:ID!){
                  ${mutationName}(input:{projectId:$projectId, itemId:$itemId}){ clientMutationId }
                }`,
                { projectId, itemId }
              )
            }

            async function getProjectItemIdByContentId(projectId, contentId) {
              let cursor = null
              while (true) {
                const res = await github.graphql(
                  `
                  query($projectId:ID!, $cursor:String){
                    node(id:$projectId){
                      ... on ProjectV2{
                        items(first:100, after:$cursor){
                          nodes{
                            id
                            content{
                              __typename
                              ... on Issue { id }
                              ... on PullRequest { id }
                              ... on DraftIssue { id }
                            }
                          }
                          pageInfo{ hasNextPage endCursor }
                        }
                      }
                    }
                  }`,
                  { projectId, cursor }
                )
                const items = res?.node?.items?.nodes ?? []
                const found = items.find(item => item?.content?.id === contentId)
                if (found?.id) return found.id

                const pageInfo = res?.node?.items?.pageInfo
                if (!pageInfo?.hasNextPage) break
                cursor = pageInfo.endCursor
              }
              return null
            }

            async function ensureProjectItem(projectId, contentId) {
              const existingItemId = await getProjectItemIdByContentId(projectId, contentId)
              if (existingItemId) return existingItemId

              const addRes = await github.graphql(
                `
                mutation($projectId:ID!,$itemId:ID!){
                  addProjectV2ItemById(input:{projectId:$projectId, contentId:$itemId}){ item { id } }
                }`,
                { projectId, itemId: contentId }
              )
              return addRes?.addProjectV2ItemById?.item?.id ?? null
            }

            async function updateProjectItemStatus(projectId, itemId, statusField, statusValue) {
              if (!statusValue) return
              const option = statusField.options?.find(o => o.name === statusValue)
              if (!option) {
                core.notice(`Status option '${statusValue}' not found, skipping sync`)
                return
              }

              await github.graphql(
                `
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!){
                  updateProjectV2ItemFieldValue(input:{
                    projectId:$projectId, itemId:$itemId,
                    fieldId:$fieldId, value:{singleSelectOptionId:$optionId}
                  }) { clientMutationId }
                }`,
                { projectId, itemId, fieldId: statusField.id, optionId: option.id }
              )
            }

            async function linkIssueToEpicParent(issueNumber, labels) {
              const epicCode = getEpicCode(labels)
              if (!epicCode) return

              const issueRes = await github.graphql(
                `
                query($owner:String!, $repo:String!, $number:Int!){
                  repository(owner:$owner, name:$repo){
                    issue(number:$number){
                      id
                      number
                      parent { id number }
                    }
                  }
                }`,
                { owner, repo, number: issueNumber }
              )
              const issue = issueRes?.repository?.issue
              if (!issue || issue.parent) return

              const epicPrefix = `${epicCode}:`
              const searchQuery = `repo:${owner}/${repo} is:issue label:epic -label:deprecated in:title \"${epicPrefix}\"`
              const epicRes = await github.graphql(
                `
                query($query:String!){
                  search(type:ISSUE, query:$query, first:10){
                    nodes{
                      ... on Issue{
                        id
                        number
                        title
                        state
                        labels(first:20){ nodes { name } }
                      }
                    }
                  }
                }`,
                { query: searchQuery }
              )
              const epicIssue = epicRes?.search?.nodes?.find(candidate => {
                const candidateLabels = normalizeLabelNames(candidate?.labels?.nodes ?? [])
                return (
                  candidate?.title?.toUpperCase().startsWith(epicPrefix) &&
                  !candidateLabels.includes("deprecated")
                )
              })

              if (!epicIssue) {
                core.notice(`No active epic found for '${epicCode}' while syncing issue #${issueNumber}`)
                return
              }
              if (epicIssue.number === issue.number) return

              await github.graphql(
                `
                mutation($issueId:ID!, $subIssueId:ID!){
                  addSubIssue(input:{issueId:$issueId, subIssueId:$subIssueId, replaceParent:true}){
                    issue { number }
                    subIssue { number }
                  }
                }`,
                { issueId: epicIssue.id, subIssueId: issue.id }
              )
              core.notice(`Linked issue #${issue.number} as sub-issue of #${epicIssue.number}`)
            }

            function escapeRegex(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")
            }

            function extractIssueNumbersFromText(text) {
              if (!text || typeof text !== "string") return []
              const issueNumbers = new Set()
              const ownerRepoPattern = `${escapeRegex(owner)}\\/${escapeRegex(repo)}`
              const referenceRegex = new RegExp(
                `(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|refs?|related to)\\s+(?:${ownerRepoPattern}#|#)(\\d+)`,
                "gi"
              )
              const plainHashRegex = new RegExp(`(?:^|\\s)(?:${ownerRepoPattern})?#(\\d+)\\b`, "gi")

              for (const regex of [referenceRegex, plainHashRegex]) {
                let match
                while ((match = regex.exec(text)) !== null) {
                  const number = Number(match[1])
                  if (Number.isInteger(number) && number > 0) issueNumbers.add(number)
                }
              }
              return [...issueNumbers]
            }

            async function getLinkedIssueNumbersFromPullRequest(pr) {
              const issueNumbers = new Set(extractIssueNumbersFromText(pr?.body ?? ""))

              try {
                const linkedRes = await github.graphql(
                  `
                  query($owner:String!, $repo:String!, $number:Int!){
                    repository(owner:$owner, name:$repo){
                      pullRequest(number:$number){
                        closingIssuesReferences(first:50){
                          nodes{ number }
                        }
                      }
                    }
                  }`,
                  { owner, repo, number: pr.number }
                )
                const nodes = linkedRes?.repository?.pullRequest?.closingIssuesReferences?.nodes ?? []
                for (const node of nodes) {
                  const number = Number(node?.number)
                  if (Number.isInteger(number) && number > 0) issueNumbers.add(number)
                }
              } catch (error) {
                core.notice(`Unable to resolve closing issues for PR #${pr.number}: ${String(error)}`)
              }

              issueNumbers.delete(pr.number)
              return [...issueNumbers]
            }

            async function syncIssueItem(issueNumber, statusHint, project, statusField) {
              let issueData
              try {
                const issueRes = await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number: issueNumber,
                })
                issueData = issueRes.data
              } catch (error) {
                core.notice(`Unable to fetch issue #${issueNumber}: ${String(error)}`)
                return
              }

              if (issueData.pull_request) {
                core.notice(`Skipping #${issueNumber} because it is a pull request`)
                return
              }
              if (!issueData.node_id) {
                core.notice(`Issue #${issueNumber} has no node id, skipping sync`)
                return
              }

              const itemId = await ensureProjectItem(project.id, issueData.node_id)
              if (!itemId) {
                core.notice(`Unable to ensure project item for issue #${issueNumber}`)
                return
              }

              const labels = normalizeLabelNames(issueData.labels)
              const isDeprecated = labels.includes("deprecated")
              if (isDeprecated) {
                await setArchiveState(project.id, itemId, true)
                core.notice(`Issue #${issueNumber} archived because it is labeled deprecated`)
                return
              }

              await setArchiveState(project.id, itemId, false)

              let statusValue = statusHint
              if (issueData.state === "closed") statusValue = "Done"
              await updateProjectItemStatus(project.id, itemId, statusField, statusValue)
              await linkIssueToEpicParent(issueNumber, labels)
            }

            async function archivePullRequestItemIfPresent(projectId, pullRequestNodeId, pullRequestNumber) {
              if (!pullRequestNodeId) return
              const prItemId = await getProjectItemIdByContentId(projectId, pullRequestNodeId)
              if (!prItemId) return
              await setArchiveState(projectId, prItemId, true)
              core.notice(`Archived PR #${pullRequestNumber} item to keep board issue-centric`)
            }

            async function getProject(login, number) {
              const fieldSelection = `
                fields(first:50){
                  nodes {
                    __typename
                    ... on ProjectV2Field { id name dataType }
                    ... on ProjectV2SingleSelectField { id name dataType options { id name } }
                  }
                }
              `
              try {
                const resOrg = await github.graphql(
                  `query($login:String!,$number:Int!){
                    organization(login:$login){ projectV2(number:$number){ id ${fieldSelection} } }
                  }`, { login, number }
                )
                if (resOrg?.organization?.projectV2) return resOrg.organization.projectV2
              } catch (e) {}
              const resUser = await github.graphql(
                `query($login:String!,$number:Int!){
                  user(login:$login){ projectV2(number:$number){ id ${fieldSelection} } }
                }`, { login, number }
              )
              return resUser?.user?.projectV2
            }

            const project = await getProject(owner, projectNumber)
            if (!project) { core.notice(`Project #${projectNumber} not found, skipping sync`); return }

            const statusField = project.fields.nodes.find(
              f => f.__typename === "ProjectV2SingleSelectField" && f.name === "Status"
            )
            if (!statusField) { core.notice("Status field not found, skipping sync"); return }
            if (!statusField.options?.length) { core.notice("Status field has no options, skipping sync"); return }

            if (context.eventName === "issues") {
              const issueNumber = context.payload?.issue?.number
              if (!issueNumber) {
                core.notice("Issue number not found, skipping sync")
                return
              }
              await syncIssueItem(issueNumber, mapIssueStatus(context.payload), project, statusField)
              return
            }

            const pr = context.payload?.pull_request
            if (!pr) {
              core.notice("Pull request payload not found, skipping sync")
              return
            }

            const prStatus = mapPullRequestStatus(context.payload)
            const linkedIssueNumbers = await getLinkedIssueNumbersFromPullRequest(pr)
            if (linkedIssueNumbers.length === 0) {
              core.notice(`PR #${pr.number} has no linked issues; nothing to sync`)
            }

            for (const issueNumber of linkedIssueNumbers) {
              await syncIssueItem(issueNumber, prStatus, project, statusField)
            }

            await archivePullRequestItemIfPresent(project.id, pr.node_id, pr.number)
