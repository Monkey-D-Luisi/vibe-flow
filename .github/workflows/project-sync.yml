name: Project Sync
on:
  pull_request:
    types: [opened, ready_for_review, review_requested, review_request_removed, closed, converted_to_draft]
  issues:
    types: [opened, edited, closed]
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Config
            const owner = context.repo.owner
            const projectNumber = 1 // your Project v2 number

            // Simple status mapping
            function mapStatus(evt, payload){
              if (context.eventName === "issues") {
                return payload.issue.state === "closed" ? "Done" : "To Do"
              }
              const pr = payload.pull_request
              if (pr.merged) return "Done"
              if (pr.draft) return "In Review" // draft PR = tech review
              return pr.state === "open" ? "In Review" : "Done"
            }
            const statusValue = mapStatus(context.payload.action, context.payload)

            // Helper: get project for org or user owner
            async function getProject(login, number){
              const qOrg = `query($login:String!,$number:Int!){
                organization(login:$login){
                  projectV2(number:$number){ id fields(first:50){ nodes { id name } } }
                }
              }`
              try {
                const resOrg = await github.graphql(qOrg, { login, number })
                if (resOrg?.organization?.projectV2) return resOrg.organization.projectV2
              } catch (e) {}
              const qUser = `query($login:String!,$number:Int!){
                user(login:$login){
                  projectV2(number:$number){ id fields(first:50){ nodes { id name } } }
                }
              }`
              const resUser = await github.graphql(qUser, { login, number })
              return resUser?.user?.projectV2
            }

            // 1) Get Project and fields
            const project = await getProject(owner, projectNumber)
            if (!project) { core.setFailed(`Project #${projectNumber} not found for '${owner}'`); return }
            const statusField = project.fields.nodes.find(f => f.name === "Status")
            if (!statusField) { core.setFailed("Project field 'Status' not found"); return }

            // 2) Ensure item exists in project
            const nodeId = context.eventName === "issues"
              ? context.payload.issue.node_id
              : context.payload.pull_request.node_id

            const addRes = await github.graphql(`
              mutation($projectId:ID!,$itemId:ID!){
                addProjectV2ItemById(input:{projectId:$projectId, contentId:$itemId}){ item { id } }
              }`,
              { projectId: project.id, itemId: nodeId }
            )
            const itemId = addRes.addProjectV2ItemById.item.id

            // 3) Update Status
            await github.graphql(`
              mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $value:String!){
                updateProjectV2ItemFieldValue(input:{
                  projectId:$projectId, itemId:$itemId,
                  fieldId:$fieldId, value:{singleSelectOptionName:$value}
                }) { clientMutationId }
              }`,
              { projectId: project.id, itemId, fieldId: statusField.id, value: statusValue }
            )