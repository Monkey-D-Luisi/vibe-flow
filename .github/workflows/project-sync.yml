name: Project Sync
on:
  issues:
    types: [opened, edited, closed, assigned, unassigned]
  pull_request:
    types: [opened, ready_for_review, review_requested, closed, merged]
  pull_request_review:
    types: [submitted, edited, dismissed]

jobs:
  sync-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            const projectNumber = 1; // Update this to your actual project number
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // GraphQL query to find the project
            const findProjectQuery = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            // Get project info
            const projectResult = await github.graphql(findProjectQuery, {
              owner,
              repo,
              number: projectNumber
            });

            const project = projectResult.repository.projectV2;
            if (!project) {
              console.log('Project not found');
              return;
            }

            // Find Status field
            const statusField = project.fields.nodes.find(field => field.name === 'Status');
            if (!statusField) {
              console.log('Status field not found');
              return;
            }

            // Map status options
            const statusOptions = {
              'To Do': statusField.options.find(opt => opt.name === 'To Do')?.id,
              'In Progress': statusField.options.find(opt => opt.name === 'In Progress')?.id,
              'In Review': statusField.options.find(opt => opt.name === 'In Review')?.id,
              'Done': statusField.options.find(opt => opt.name === 'Done')?.id
            };

            // Determine new status based on event
            let newStatus = null;
            const eventName = context.eventName;
            const payload = context.payload;

            if (eventName === 'issues') {
              const issue = payload.issue;
              if (issue.state === 'closed') {
                newStatus = statusOptions['Done'];
              } else if (issue.labels.some(l => l.name.includes('in-review'))) {
                newStatus = statusOptions['In Review'];
              } else {
                newStatus = statusOptions['To Do'];
              }
            } else if (eventName === 'pull_request') {
              const pr = payload.pull_request;
              if (pr.merged || pr.state === 'closed') {
                newStatus = statusOptions['Done'];
              } else if (pr.draft) {
                newStatus = statusOptions['In Progress'];
              } else {
                newStatus = statusOptions['In Review'];
              }
            }

            if (!newStatus) {
              console.log('No status change needed');
              return;
            }

            // Add or update item in project
            const itemId = payload.issue?.node_id || payload.pull_request?.node_id;
            if (!itemId) return;

            // Add item to project if not already there
            const addItemMutation = `
              mutation($projectId: ID!, $itemId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $itemId}) {
                  item {
                    id
                  }
                }
              }
            `;

            try {
              const addResult = await github.graphql(addItemMutation, {
                projectId: project.id,
                itemId: itemId
              });

              // Update status field
              const updateFieldMutation = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId,
                    itemId: $itemId,
                    fieldId: $fieldId,
                    value: $value
                  }) {
                    projectV2Item {
                      id
                    }
                  }
                }
              `;

              await github.graphql(updateFieldMutation, {
                projectId: project.id,
                itemId: addResult.addProjectV2ItemById.item.id,
                fieldId: statusField.id,
                value: newStatus
              });

              console.log('Project item updated successfully');
            } catch (error) {
              console.log('Error updating project:', error.message);
            }