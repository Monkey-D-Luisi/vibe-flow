name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        working-directory: extensions/product-team
        run: node -e "const c=require('child_process'),p=require('path');const pkg=p.dirname(require.resolve('better-sqlite3/package.json'));console.log('Rebuilding better-sqlite3 at',pkg);c.execSync('npm run install',{cwd:pkg,stdio:'inherit'});"

      - name: Security audit policy gate
        run: pnpm verify:vuln-policy

      - name: Validate tool allow-lists
        run: pnpm tsx scripts/validate-allowlists.ts

      - name: Verify root quality-gate command surface
        run: pnpm verify:q-surface

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Coverage policy
        run: |
          set -e
          pnpm --filter @openclaw/quality-gate test:coverage || exit 1
          pnpm --filter @openclaw/product-team test:coverage || exit 1
          pnpm --filter @openclaw/quality-contracts test:coverage || exit 1

  publish:
    name: Publish to npm
    needs: quality-gate
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate CHANGELOG.md
        run: pnpm changelog

      - name: Dry-run publish (verify all packages can be published)
        run: node scripts/publish-packages.mjs --dry-run

      - name: Publish to npm with provenance
        run: node scripts/publish-packages.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES_FILE="$(mktemp)"
          if [ -f CHANGELOG.md ]; then
            awk "/^## \\[${TAG#v}\\]/,/^## \\[/" CHANGELOG.md | head -n -1 > "$NOTES_FILE"
          fi
          if [ ! -s "$NOTES_FILE" ]; then
            echo "Release ${TAG}" > "$NOTES_FILE"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              --verify-tag
          fi
          rm -f "$NOTES_FILE"
