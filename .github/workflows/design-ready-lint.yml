name: design-ready-lint

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  design-ready:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install -w --frozen-lockfile

      - name: Generate design ready artifact
        run: pnpm design:gen

      - name: Lint design ready artifact
        run: pnpm design:lint
