name: Quality Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]
  push:
    branches: [main]

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    name: secrets-scan
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --config .gitleaks.toml --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  quality-gate:
    name: quality-gate
    needs: secrets-scan
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      # --- Setup ---

      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        working-directory: extensions/product-team
        run: node -e "const c=require('child_process'),p=require('path');const pkg=p.dirname(require.resolve('better-sqlite3/package.json'));console.log('Rebuilding better-sqlite3 at',pkg);c.execSync('npm run install',{cwd:pkg,stdio:'inherit'});"

      # --- Quality metric collection ---

      - name: Run tests
        id: tests
        run: pnpm q:tests
        continue-on-error: true

      - name: Generate coverage data
        run: |
          pnpm --filter @openclaw/quality-gate test:coverage || true
          pnpm --filter @openclaw/product-team test:coverage || true
          pnpm --filter @openclaw/quality-contracts test:coverage || true

      - name: Collect coverage report
        id: coverage
        run: pnpm q:coverage
        continue-on-error: true

      - name: Lint gate
        id: lint
        run: pnpm q:lint
        continue-on-error: true

      - name: Complexity gate
        id: complexity
        run: pnpm q:complexity
        continue-on-error: true

      - name: Vulnerability policy
        id: vuln
        run: |
          set +e
          pnpm verify:vuln-policy > /tmp/vuln-output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      # --- PR comment report ---

      - name: Build and upsert quality report comment
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          COMPLEXITY_OUTCOME: ${{ steps.complexity.outcome }}
          COVERAGE_OUTCOME: ${{ steps.coverage.outcome }}
          VULN_EXIT: ${{ steps.vuln.outputs.exit_code }}
        run: |
          QREPORT="extensions/quality-gate/.qreport"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${{ github.run_id }}"
          SHORT_SHA="${SHA:0:7}"

          # Safe fallback for vuln exit code
          VULN_EXIT="${VULN_EXIT:-1}"

          # ---- Tests ----
          if [ -f "$QREPORT/tests.json" ]; then
            TESTS_PASSED=$(jq -r 'if .summary then (.summary.passed | tostring) else "N/A" end' "$QREPORT/tests.json")
            TESTS_FAILED=$(jq -r 'if .summary then (.summary.failed | tostring) else "N/A" end' "$QREPORT/tests.json")
          else
            TESTS_PASSED="N/A"
            TESTS_FAILED="N/A"
          fi
          if [ "$TESTS_OUTCOME" = "success" ]; then TESTS_ICON="✅"; else TESTS_ICON="❌"; fi
          TESTS_DETAIL="Passed: ${TESTS_PASSED}, Failed: ${TESTS_FAILED}"

          # ---- Coverage ----
          if [ -f "$QREPORT/coverage.json" ]; then
            LINE_PCT=$(jq -r '.linePct // "N/A"' "$QREPORT/coverage.json")
            BRANCH_PCT=$(jq -r '.branchPct // "N/A"' "$QREPORT/coverage.json")
            COV_DETAIL="Lines: ${LINE_PCT}%, Branches: ${BRANCH_PCT}%"
          else
            COV_DETAIL="No coverage data"
          fi
          if [ "$COVERAGE_OUTCOME" = "success" ]; then COV_ICON="✅"; else COV_ICON="⚠️"; fi

          # ---- Lint ----
          if [ -f "$QREPORT/lint.json" ]; then
            LINT_ERRORS=$(jq -r '.totalErrors' "$QREPORT/lint.json")
            LINT_WARNINGS=$(jq -r '.totalWarnings' "$QREPORT/lint.json")
            LINT_DETAIL="Errors: ${LINT_ERRORS}, Warnings: ${LINT_WARNINGS}"
          else
            LINT_DETAIL="No lint data"
          fi
          if [ "$LINT_OUTCOME" = "success" ]; then LINT_ICON="✅"; else LINT_ICON="❌"; fi

          # ---- Complexity ----
          if [ -f "$QREPORT/complexity.json" ]; then
            MAX_CC=$(jq -r '.summary.maxCyclomatic' "$QREPORT/complexity.json")
            HOTSPOTS=$(jq -r '.hotspotCount' "$QREPORT/complexity.json")
            CC_DETAIL="Max cyclomatic: ${MAX_CC}, Hotspots: ${HOTSPOTS}"
          else
            CC_DETAIL="No complexity data"
          fi
          if [ "$COMPLEXITY_OUTCOME" = "success" ]; then CC_ICON="✅"; else CC_ICON="❌"; fi

          # ---- Vulnerability policy ----
          VULN_OUTPUT=$(cat /tmp/vuln-output.txt 2>/dev/null || echo "(no output)")
          if [ "$VULN_EXIT" = "0" ]; then
            VULN_ICON="✅"
            VULN_DETAIL="PASS"
          else
            VULN_ICON="❌"
            VULN_DETAIL="FAIL"
          fi

          # ---- Overall verdict ----
          GATE_FAILED=0
          [ "$TESTS_OUTCOME" = "failure" ] && GATE_FAILED=1
          [ "$LINT_OUTCOME" = "failure" ] && GATE_FAILED=1
          [ "$COVERAGE_OUTCOME" = "failure" ] && GATE_FAILED=1
          [ "$COMPLEXITY_OUTCOME" = "failure" ] && GATE_FAILED=1
          [ "$VULN_EXIT" != "0" ] && GATE_FAILED=1

          # ---- Label bypass ----
          BYPASSED=0
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "0" ]; then
            BYPASS_LABEL=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/labels" \
              --jq '.[].name' 2>/dev/null | grep -c '^bypass-quality-gate$' || true)
            [ "$BYPASS_LABEL" != "0" ] && BYPASSED=1
          fi

          if [ "$GATE_FAILED" = "1" ] && [ "$BYPASSED" = "1" ]; then
            VERDICT_ICON="⚠️"
            VERDICT_TEXT="BYPASSED"
          elif [ "$GATE_FAILED" = "1" ]; then
            VERDICT_ICON="❌"
            VERDICT_TEXT="FAIL"
          else
            VERDICT_ICON="✅"
            VERDICT_TEXT="PASS"
          fi

          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          # ---- Build report markdown ----
          {
            printf '<!-- quality-gate-report -->\n'
            printf '## %s Quality Gate — %s\n\n' "$VERDICT_ICON" "$VERDICT_TEXT"
            printf '| Check | Status | Details |\n'
            printf '|-------|--------|---------|\n'
            printf '| Tests | %s | %s |\n' "$TESTS_ICON" "$TESTS_DETAIL"
            printf '| Coverage | %s | %s |\n' "$COV_ICON" "$COV_DETAIL"
            printf '| Lint | %s | %s |\n' "$LINT_ICON" "$LINT_DETAIL"
            printf '| Complexity | %s | %s |\n' "$CC_ICON" "$CC_DETAIL"
            printf '| Vulnerability Policy | %s | %s |\n' "$VULN_ICON" "$VULN_DETAIL"
            printf '\n'
            if [ "$BYPASSED" = "1" ]; then
              printf '> **⚠️ Quality gate bypassed** via `bypass-quality-gate` label.\n\n'
            fi
            printf '<details><summary>Vulnerability policy output</summary>\n\n'
            printf '```\n'
            printf '%s\n' "$VULN_OUTPUT"
            printf '```\n\n'
            printf '</details>\n\n'
            printf '_Commit: `%s` · [CI run](%s) · %s_\n' "$SHORT_SHA" "$RUN_URL" "$TIMESTAMP"
          } > /tmp/qg-report.md

          # ---- Upsert PR comment ----
          EXISTING_ID=$(gh api --paginate "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("<!-- quality-gate-report -->")) | .id' \
            | head -1)

          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING_ID}" \
              --method PATCH \
              --field body=@/tmp/qg-report.md
          else
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --method POST \
              --field body=@/tmp/qg-report.md
          fi

          # ---- Fail the job if gate failed and not bypassed ----
          if [ "$GATE_FAILED" = "1" ] && [ "$BYPASSED" = "0" ]; then
            echo "::error::Quality gate FAILED"
            exit 1
          fi

  e2e-pipeline:
    name: e2e-pipeline
    needs: quality-gate
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        working-directory: extensions/product-team
        run: node -e "const c=require('child_process'),p=require('path');const pkg=p.dirname(require.resolve('better-sqlite3/package.json'));console.log('Rebuilding better-sqlite3 at',pkg);c.execSync('npm run install',{cwd:pkg,stdio:'inherit'});"

      - name: Run E2E pipeline tests
        run: pnpm test:e2e

  perf-baseline:
    name: perf-baseline
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        working-directory: extensions/product-team
        run: node -e "const c=require('child_process'),p=require('path');const pkg=p.dirname(require.resolve('better-sqlite3/package.json'));console.log('Rebuilding better-sqlite3 at',pkg);c.execSync('npm run install',{cwd:pkg,stdio:'inherit'});"

      - name: Run benchmarks
        run: pnpm perf:bench

      - name: Compare against baseline
        run: pnpm perf:compare --current docs/benchmarks/current.json
