name: adr-lint

on:
  push:
    paths:
      - 'docs/adr/**'
      - 'tooling/adr/**'
      - '.github/workflows/adr-lint.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - 'docs/adr/**'
      - 'tooling/adr/**'
      - '.github/workflows/adr-lint.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  lint:
    name: ADR Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run adr:lint
        run: pnpm adr:lint
